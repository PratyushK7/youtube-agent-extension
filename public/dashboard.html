<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Research Hub | Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #ff0000;
      --accent-glow: rgba(255, 0, 0, 0.2);
      --text: #ffffff;
      --text-dim: #a0a0a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      padding-bottom: 50px;
    }

    .navbar {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-circle {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #cc0000);
      border-radius: 8px;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 40px;
    }

    h2 {
      font-family: 'Outfit', sans-serif;
      margin-bottom: 30px;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .card-image-box {
      width: 100%;
      height: 200px;
      background: #111;
      position: relative;
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .card:hover .card-image {
      opacity: 1;
    }

    .card-content {
      padding: 24px;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .card-meta {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }

    .btn-view {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      transition: 0.2s;
    }

    .btn-view:hover {
      background: white;
      color: black;
    }

    /* Modal Styling */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      z-index: 1000;
      padding: 60px;
    }

    .modal-content {
      max-width: 1000px;
      margin: 0 auto;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 24px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
    }

    .view-toggles {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .btn-toggle {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-toggle.active {
      background: white; color: black;
    }

    /* Spreadsheet Styles */
    .spreadsheet-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #080808;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      table-layout: fixed;
    }

    th {
      background: #111;
      color: #aaa;
      font-weight: 600;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      white-space: nowrap;
      width: 200px;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: #ccc;
      vertical-align: top;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .col-fixed { position: sticky; left: 0; background: #111; z-index: 10; width: 60px; }
    .col-title { width: 300px; font-weight: 600; color: white; }
    .col-report { width: 500px; }

    .badge-metric {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,0,0,0.1);
      color: var(--accent);
      font-weight: 600;
      font-size: 10px;
    }

    .report-view {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    /* Card View Styles */
    .metrics-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding-top: 20px;
    }

    .metric-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: 0.3s;
    }

    .metric-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-4px);
    }

    .metric-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .metric-card-num {
      font-weight: 800;
      color: var(--accent);
      font-size: 14px;
    }

    .metric-card-title {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.4;
      color: white;
    }

    .metric-card-stat {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 10px;
    }

    .metric-card-badge {
      align-self: flex-start;
      background: rgba(255,0,0,0.1);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric-card-desc {
      font-size: 12px;
      line-height: 1.5;
      color: #ccc;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .close-btn {
      color: var(--text-dim);
      font-size: 30px;
      cursor: pointer;
      line-height: 1;
    }
    
    .empty-state {
      text-align: center;
      padding: 100px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <div class="logo-circle"></div>
      YouTube Research Hub
    </div>
    <div>
      <a href="index.html" class="btn-view">Main Analyzer</a>
    </div>
  </nav>

  <div class="container">
    <h2>Analysis History</h2>
    <div id="history-grid" class="grid">
      <!-- Cards go here -->
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">
      <h3>No analyses found.</h3>
      <p>Start by analyzing a channel with the browser extension.</p>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div style="display:flex; align-items:center; gap:20px;">
          <h2 id="modal-title" style="margin-bottom:0; font-size:24px;">Channel Analysis</h2>
          <select id="run-selector" style="background:rgba(255,255,255,0.1); border:1px solid var(--border); color:white; padding:4px 10px; border-radius:8px; font-size:12px; cursor:pointer;">
          </select>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
          <button id="btn-run-tool" class="btn-toggle" style="background:var(--accent); border:none; font-weight:700;">+ Run Next Tool</button>
          <span class="close-btn" id="close-modal">&times;</span>
        </div>
      </div>
      <div class="modal-body">
        <div class="view-toggles">
          <button id="toggle-list" class="btn-toggle active">Strategic Insights</button>
          <button id="toggle-data" class="btn-toggle">Deep Metrics</button>
          <button id="toggle-image" class="btn-toggle">Channel Screenshot</button>
        </div>

        <!-- Metric View Toggles (Level 2) -->
        <div id="data-controls" style="display:none; margin-bottom:20px; border-top:1px solid var(--border); padding-top:20px; gap:10px;">
          <span style="font-size:12px; color:var(--text-dim); margin-right:10px;">DISPLAY AS:</span>
          <button id="btn-layout-table" class="btn-toggle active" style="font-size:11px;">Spreadsheet</button>
          <button id="btn-layout-cards" class="btn-toggle" style="font-size:11px;">Video Cards</button>
        </div>

        <!-- Strategic View -->
        <div id="view-strategic" class="report-view">
          <div class="report-box">
            <h3 style="margin-bottom:15px; font-size:18px;">AI Strategic Report</h3>
            <div id="modal-report" style="font-size:15px; line-height:1.7; color:#eee; white-space:pre-wrap;"></div>
          </div>
          <div>
            <img id="modal-image-preview" src="" style="width:100%; border-radius:12px; border:1px solid var(--border);">
          </div>
        </div>

        <!-- Spreadsheet View -->
        <div id="view-spreadsheet" class="spreadsheet-container" style="display:none;">
          <table id="metrics-table">
            <thead>
              <tr>
                <th class="col-fixed">#</th>
                <th class="col-title">Title</th>
                <th>Views</th>
                <th>Duration</th>
                <th>Hook Type</th>
                <th>Hook Framework</th>
                <th>Storytelling</th>
                <th>Retention</th>
                <th>Key Takeaway</th>
              </tr>
            </thead>
            <tbody id="metrics-body"></tbody>
          </table>
        </div>

        <!-- Card View -->
        <div id="view-cards" class="metrics-cards-grid" style="display:none;">
          <!-- Cards injected here -->
        </div>

        <!-- Screenshot View -->
        <div id="view-capture" style="display:none; text-align:center;">
          <img id="modal-image-full" src="" style="max-width:100%; border:1px solid var(--border); border-radius:12px;">
        </div>
      </div>
    </div>
  </div>

  <script>
    async function loadHistory() {
      const res = await fetch('/api/history');
      const data = await res.json();
      
      const grid = document.getElementById('history-grid');
      const empty = document.getElementById('empty-state');
      
      if (data.length === 0) {
        empty.style.display = 'block';
        return;
      }

      // Group by Channel Name
      const dossiers = data.reduce((acc, entry) => {
        if (!acc[entry.channel]) acc[entry.channel] = [];
        acc[entry.channel].push(entry);
        return acc;
      }, {});

      grid.innerHTML = Object.entries(dossiers).map(([channel, entries]) => {
        const latest = entries[0];
        const hasMetrics = entries.find(e => e.videos && e.videos.length > 0);
        
        return `
          <div class="card" onclick='openDossier(${JSON.stringify(entries).replace(/'/g, "&apos;")})'>
            <div class="card-image-box">
              <img src="${latest.screenshot}" class="card-image">
              <div style="position:absolute; bottom:15px; right:15px; background:var(--accent); color:white; padding:4px 10px; border-radius:10px; font-size:10px; font-weight:700;">
                ${entries.length} RUNS
              </div>
            </div>
            <div class="card-content">
              <div class="card-title">${channel}</div>
              <div class="card-meta">
                <span>Updated: ${new Date(latest.timestamp).toLocaleDateString()}</span>
                <span>${hasMetrics ? '📊 METRICS' : '📄 REPORT'}</span>
              </div>
              <div class="btn-view">Expand Dossier</div>
            </div>
          </div>
        `;
      }).join('');
    }

    const modal = document.getElementById('modal');
    const vStrategic = document.getElementById('view-strategic');
    const vSpreadsheet = document.getElementById('view-spreadsheet');
    const vCards = document.getElementById('view-cards');
    const vCapture = document.getElementById('view-capture');
    const dataControls = document.getElementById('data-controls');
    
    const navBtns = [document.getElementById('toggle-list'), document.getElementById('toggle-data'), document.getElementById('toggle-image')];
    const layoutBtns = [document.getElementById('btn-layout-table'), document.getElementById('btn-layout-cards')];

    let currentVideos = [];
    let currentLayout = 'table'; // 'table' or 'cards'

    window.openDossier = (entries) => {
      entries.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
      const selector = document.getElementById('run-selector');
      selector.innerHTML = entries.map(e => `
        <option value="${e.id}">${new Date(e.timestamp).toLocaleString()} - ${e.videos?.length ? 'STRATEGIC SOP' : 'TOOL REPORT'}</option>
      `).join('');
      selector.onchange = () => {
        openEntry(entries.find(e => e.id === selector.value));
      };
      document.getElementById('btn-run-tool').onclick = () => window.open('https://youtube.com', '_blank');
      modal.currentEntries = entries;
      openEntry(entries[0]);
    }

    window.openEntry = (entry) => {
      document.getElementById('modal-title').innerText = entry.channel;
      document.getElementById('modal-report').innerText = entry.report || 'Strategic insights being processed...';
      document.getElementById('modal-image-preview').src = entry.screenshot;
      document.getElementById('modal-image-full').src = entry.screenshot;
      
      currentVideos = entry.videos || [];
      if (currentVideos.length > 0) {
        document.getElementById('toggle-data').style.display = 'block';
        renderMetrics();
        switchView(currentLayout === 'table' ? 'metrics-table' : 'metrics-cards');
      } else {
        document.getElementById('toggle-data').style.display = 'none';
        switchView('strategic');
      }
      modal.style.display = 'block';
    }

    function renderMetrics() {
      // Render Table
      const body = document.getElementById('metrics-body');
      body.innerHTML = currentVideos.map(v => `
        <tr>
          <td class="col-fixed">${v.videoNumber}</td>
          <td class="col-title">${v.title}</td>
          <td>${v.views}</td>
          <td>${v.durationSec}s</td>
          <td><span class="badge-metric">${v.hookType || 'N/A'}</span></td>
          <td>${v.hookFramework || '-'}</td>
          <td>${v.storytellingFramework || '-'}</td>
          <td>${v.retentionPattern || '-'}</td>
          <td style="white-space:normal;">${v.keyTakeaways || '-'}</td>
        </tr>
      `).join('');

      // Render Cards
      const grid = document.getElementById('view-cards');
      grid.innerHTML = currentVideos.map(v => `
        <div class="metric-card">
          <div class="metric-card-header">
            <span class="metric-card-num">#${v.videoNumber}</span>
            <span class="metric-card-badge">${v.hookType || 'Insight'}</span>
          </div>
          <div class="metric-card-title">${v.title}</div>
          <div class="metric-card-stat">
            <span>🔥 ${v.views}</span>
            <span>⏱️ ${v.durationSec}s</span>
          </div>
          <div class="metric-card-desc"><b>Hook:</b> ${v.hookText || '-'}</div>
          <div class="metric-card-desc"><b>Takeaway:</b> ${v.keyTakeaways || '-'}</div>
        </div>
      `).join('');
    }

    function switchView(tab) {
      vStrategic.style.display = tab === 'strategic' ? 'grid' : 'none';
      vSpreadsheet.style.display = tab === 'metrics-table' ? 'block' : 'none';
      vCards.style.display = tab === 'metrics-cards' ? 'grid' : 'none';
      vCapture.style.display = tab === 'capture' ? 'block' : 'none';
      
      dataControls.style.display = (tab === 'metrics-table' || tab === 'metrics-cards') ? 'flex' : 'none';

      navBtns.forEach(b => b.classList.remove('active'));
      if (tab === 'strategic') navBtns[0].classList.add('active');
      if (tab.startsWith('metrics')) navBtns[1].classList.add('active');
      if (tab === 'capture') navBtns[2].classList.add('active');

      layoutBtns.forEach(b => b.classList.remove('active'));
      if (tab === 'metrics-table') layoutBtns[0].classList.add('active');
      if (tab === 'metrics-cards') layoutBtns[1].classList.add('active');
    }

    document.getElementById('toggle-list').onclick = () => switchView('strategic');
    document.getElementById('toggle-data').onclick = () => switchView(currentLayout === 'table' ? 'metrics-table' : 'metrics-cards');
    document.getElementById('toggle-image').onclick = () => switchView('capture');

    document.getElementById('btn-layout-table').onclick = () => { currentLayout = 'table'; switchView('metrics-table'); };
    document.getElementById('btn-layout-cards').onclick = () => { currentLayout = 'cards'; switchView('metrics-cards'); };

    document.getElementById('close-modal').onclick = () => {
      modal.style.display = 'none';
    }

    window.onclick = (e) => {
      if (e.target == modal) modal.style.display = 'none';
    }

    loadHistory();
  </script>
</body>
</html>
