<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; font-family: 'Inter', -apple-system, sans-serif; background: #0f1117; color: #e2e8f0; }
    .hdr { padding: 12px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .hdr-icon { width: 24px; height: 24px; border-radius: 6px; background: #6366f1; display: flex; align-items: center; justify-content: center; }
    .hdr-icon svg { width: 13px; height: 13px; color: white; }
    .hdr-name { font-size: 13px; font-weight: 700; color: #f1f5f9; }
    .hdr-status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 10px; color: #475569; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .actions { padding: 8px 14px 12px; display: flex; flex-direction: column; gap: 5px; }
    .btn { width: 100%; padding: 8px; border: none; border-radius: 6px; font-family: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #5558e6; }
    .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: #64748b; font-size: 10.5px; }
    .btn-ghost:hover { background: rgba(255,255,255,0.04); color: #94a3b8; }
    .btn-warn { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.12); color: #ef4444; font-size: 11px; }
    .row { display: flex; gap: 5px; }
    .row .btn { flex: 1; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="hdr">
    <div class="hdr-icon">
      <img src="icons/icon48.png" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">
    </div>
    <span class="hdr-name">ChannelLens</span>
    <span class="hdr-status"><span id="server-dot" class="dot dot-red"></span><span id="server-txt">Offline</span></span>
  </div>

  <!-- Server Toggle -->
  <div style="padding: 12px 14px 4px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.04);">
    <div style="display: flex; flex-direction: column; gap: 2px;">
      <span style="font-size: 11px; font-weight: 600; color: #94a3b8;">Dev Server</span>
      <span id="manager-status" style="font-size: 9px; color: #475569;">Manager Offline</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="server-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <style>
    .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1e293b; transition: .3s; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 2px; background-color: #64748b; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #6366f1; border-color: #818cf8; }
    input:checked + .slider:before { transform: translateX(16px); background-color: white; }
    input:disabled + .slider { opacity: 0.5; cursor: not-allowed; }
  </style>

  <div class="actions">
    <button id="reset-session" class="btn btn-warn hidden">Reset Stuck Session</button>
    <div class="row">
      <button id="open-yt" class="btn btn-primary">YouTube</button>
      <button id="view-db" class="btn btn-primary">Dashboard</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
