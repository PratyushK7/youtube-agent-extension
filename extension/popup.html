<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap');

    body {
      width: 320px;
      margin: 0;
      padding: 24px;
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #fff;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #ff0000 0%, #10a37f 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: bold;
      font-size: 20px;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
      margin-bottom: 20px;
      margin-top: 4px;
    }
    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }
    .stat {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 12px;
    }
    .stat:first-child { margin-top: 0; }
    .stat span:last-child {
      color: #10a37f;
      font-weight: 600;
    }
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .btn-main {
      width: 100%;
      background: white;
      color: black;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      margin-top: 20px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
    }
    .badge {
      background: rgba(16, 163, 127, 0.15);
      color: #10a37f;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">RD</div>
    <div>
      <h1>Dossier Agent</h1>
      <span class="badge">Research Engine</span>
    </div>
  </div>
  
  <p>Your tactical bridge for building deep YouTube dossiers and SOPs via ChatGPT Vision.</p>

  <div class="status-card">
    <div style="font-weight: 600; font-size: 13px; margin-bottom: 12px; color: #eee;">Global Status</div>
    <div class="stat">
      <span>Extension Engine</span>
      <span>ENABLED</span>
    </div>
    <div class="stat">
      <span>Strategic SOP</span>
      <span id="sop-status" style="color:#aaa;">NONE</span>
    </div>
    
    <label style="display:block; font-size:11px; color:#aaa; margin-top:15px; margin-bottom:5px;">SELECT ANALYSIS PROMPT</label>
    <select id="prompt-select" style="width:100%; background:rgba(255,255,255,0.1); border:1px solid var(--border); color:white; padding:8px; border-radius:8px; font-size:12px; cursor:pointer;">
      <option value="">Loading prompts...</option>
    </select>
  </div>

  <button id="open-yt" class="btn-main">Go to YouTube</button>
  <button id="view-db" class="btn-main" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:white; margin-top:10px;">Open Dashboard</button>

  <div class="footer">
    Build 1.0.5 &bull; Advanced Agentic Engine
  </div>

  <script src="popup.js"></script>
</body>
</html>
