<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChannelLens Popup</title>
  <link rel="stylesheet" href="ui.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; }

    body {
      width: 340px;
      max-width: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--ui-bg);
      color: var(--ui-text);
    }

    .popup-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--ui-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .popup-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--ui-primary), var(--ui-primary-2), #38bdf8);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(124,131,255,0.3);
    }

    .popup-logo svg { width: 20px; height: 20px; color: white; }
    .popup-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }

    .popup-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(141, 147, 255, 0.18);
      color: #cfd3ff;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .popup-body { padding: 16px 20px; }

    .popup-desc {
      font-size: 13px;
      color: var(--ui-text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .status-card {
      background: var(--ui-surface);
      border: 1px solid var(--ui-border);
      border-radius: var(--ui-radius-lg);
      padding: 14px 16px;
    }

    .status-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--ui-text-soft);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      font-size: 13px;
    }

    .stat-row + .stat-row { border-top: 1px solid rgba(255,255,255,0.07); }
    .stat-label { color: var(--ui-text-muted); }
    .stat-val { font-weight: 700; font-size: 12px; }
    .stat-val.online { color: var(--ui-success); }
    .stat-val.offline { color: var(--ui-danger); }
    .stat-val.progress { color: var(--ui-warn); }
    .stat-val.none { color: #cbd5e1; }

    .prompt-section { margin-top: 14px; }
    .prompt-label {
      display: inline-block;
      font-size: 11px;
      color: var(--ui-text-soft);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .prompt-select {
      width: 100%;
      background: #0d0f16;
      border: 1px solid var(--ui-border);
      color: var(--ui-text);
      padding: 9px 12px;
      border-radius: var(--ui-radius-md);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .popup-actions {
      padding: 4px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: var(--ui-radius-md);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: var(--ui-hit-min);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--ui-primary), var(--ui-primary-2));
      color: white;
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,131,255,0.4); }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--ui-border);
      color: var(--ui-text-muted);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--ui-text); }

    .popup-footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 10px;
      color: var(--ui-text-soft);
      text-align: center;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      body { width: 100vw; }
      .popup-header,
      .popup-body,
      .popup-actions,
      .popup-footer { padding-inline: 14px; }
    }
  </style>
</head>
<body>
  <header class="popup-header">
    <div class="popup-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <h1 class="popup-title">ChannelLens</h1>
      <span class="popup-badge">Research Agent</span>
    </div>
  </header>

  <main class="popup-body" aria-labelledby="popup-intro">
    <p id="popup-intro" class="popup-desc">Strategic YouTube channel dossier builder. Analyze videos with ChatGPT Vision + transcripts.</p>

    <section class="status-card" aria-labelledby="status-heading">
      <h2 id="status-heading" class="status-header">System Status</h2>
      <div class="stat-row">
        <span class="stat-label">Extension</span>
        <span class="stat-val online" aria-live="polite">ACTIVE</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Session</span>
        <span id="sop-status" class="stat-val none" aria-live="polite">NONE</span>
      </div>

      <div class="prompt-section">
        <label for="prompt-select" class="prompt-label">Analysis Prompt</label>
        <select id="prompt-select" class="prompt-select" aria-describedby="popup-intro">
          <option value="">Loading prompts...</option>
        </select>
      </div>
    </section>
  </main>

  <nav class="popup-actions" aria-label="Primary actions">
    <button id="resume-session" class="btn btn-primary" style="display: none; background: linear-gradient(135deg, #f59e0b, #fbbf24);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Resume Stuck Session
    </button>
    <button id="open-yt" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Open YouTube
    </button>
    <button id="view-db" class="btn btn-secondary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      View Dashboard
    </button>
  </nav>

  <footer class="popup-footer">
    ChannelLens v1.1 &middot; AI Research Engine
  </footer>

  <script src="popup.js"></script>
</body>
</html>
