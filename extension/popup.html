<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #07080c;
      color: #f0f1f5;
      overflow: hidden;
    }

    .popup-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 12px;
    }
    .popup-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #7c83ff, #a78bfa, #38bdf8);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(124,131,255,0.3);
    }
    .popup-logo svg { width: 20px; height: 20px; color: white; }
    .popup-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
    .popup-badge {
      display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: 700;
      background: rgba(124,131,255,0.12); color: #7c83ff; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px;
    }

    .popup-body { padding: 16px 20px; }

    .popup-desc {
      font-size: 12.5px; color: #8b8fa3; line-height: 1.6; margin-bottom: 16px;
    }

    .status-card {
      background: #111320; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px 16px;
    }
    .status-header {
      font-size: 11px; font-weight: 600; color: #555a6e; text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; font-size: 12.5px;
    }
    .stat-row + .stat-row { border-top: 1px solid rgba(255,255,255,0.04); }
    .stat-label { color: #8b8fa3; }
    .stat-val { font-weight: 600; font-size: 11.5px; }
    .stat-val.online { color: #34d399; }
    .stat-val.offline { color: #f87171; }
    .stat-val.progress { color: #fb923c; }
    .stat-val.none { color: #555a6e; }

    .prompt-section { margin-top: 14px; }
    .prompt-label {
      font-size: 10px; color: #555a6e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .prompt-select {
      width: 100%; background: #0d0f16; border: 1px solid rgba(255,255,255,0.08);
      color: #f0f1f5; padding: 9px 12px; border-radius: 10px; font-size: 12px;
      cursor: pointer; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .prompt-select:focus { border-color: rgba(124,131,255,0.4); }

    .popup-actions { padding: 4px 20px 20px; display: flex; flex-direction: column; gap: 8px; }

    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 10px;
      font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c83ff, #a78bfa); color: white;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,131,255,0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #8b8fa3;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: #f0f1f5; }

    .popup-footer {
      padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 10px; color: #333; text-align: center; letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="popup-title">ChannelLens</div>
      <span class="popup-badge">Research Agent</span>
    </div>
  </div>
  
  <div class="popup-body">
    <p class="popup-desc">Strategic YouTube channel dossier builder. Analyze videos with ChatGPT Vision + transcripts.</p>

    <div class="status-card">
      <div class="status-header">System Status</div>
      <div class="stat-row">
        <span class="stat-label">Extension</span>
        <span class="stat-val online">ACTIVE</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Session</span>
        <span id="sop-status" class="stat-val none">NONE</span>
      </div>
    
    <div class="prompt-section">
      <div class="prompt-label">Analysis Prompt</div>
      <select id="prompt-select" class="prompt-select">
        <option value="">Loading prompts...</option>
      </select>
    </div>
  </div>

  <div class="popup-actions">
    <button id="open-yt" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Open YouTube
    </button>
    <button id="view-db" class="btn btn-secondary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      View Dashboard
    </button>
  </div>

  <div class="popup-footer">
    ChannelLens v1.1 &middot; AI Research Engine
  </div>

  <script src="popup.js"></script>
</body>
</html>
